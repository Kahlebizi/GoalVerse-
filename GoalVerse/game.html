<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoalVerse - Jogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            touch-action: none;
        }

        .game-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0a0a1a;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: rgba(26, 26, 46, 0.95);
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
            min-height: 50px;
            flex-shrink: 0;
            z-index: 10;
        }

        .game-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .game-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .room-badge {
            background: rgba(102, 126, 234, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            color: #667eea;
            font-size: 12px;
            font-weight: 600;
        }

        .player-badge {
            color: white;
            font-size: 13px;
            font-weight: 600;
        }

        .player-badge span {
            color: #4CAF50;
        }

        .btn-leave-game {
            padding: 6px 16px;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 10px;
            color: #f44336;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-leave-game:hover {
            background: rgba(244, 67, 54, 0.3);
        }

        .game-container {
            flex: 1;
            position: relative;
            background: #0f3460;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0f3460;
            touch-action: none;
            cursor: none;
        }

        .score-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            z-index: 5;
        }

        .score-team {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .score-team.red {
            color: #f44336;
        }

        .score-team.blue {
            color: #2196F3;
        }

        .score-divider {
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
        }

        .game-status-bar {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
        }

        .mobile-controls.active {
            display: flex;
        }

        .joystick-area {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            pointer-events: auto;
            touch-action: none;
        }

        .joystick-knob {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.8), rgba(118, 75, 162, 0.8));
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }

        .kick-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #f44336, #d32f2f);
            border: 3px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 16px;
            font-weight: bold;
            pointer-events: auto;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(244, 67, 54, 0.3);
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .kick-button:active {
            transform: scale(0.9);
            box-shadow: 0 0 60px rgba(244, 67, 54, 0.5);
        }

        .waiting-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            backdrop-filter: blur(5px);
        }

        .waiting-overlay.show {
            display: flex;
        }

        .waiting-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .waiting-text {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .waiting-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 5px;
        }

        .mode-badge {
            position: absolute;
            top: 70px;
            left: 15px;
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid rgba(255, 152, 0, 0.3);
            padding: 6px 14px;
            border-radius: 10px;
            color: #FF9800;
            font-size: 12px;
            font-weight: 600;
            pointer-events: none;
            z-index: 5;
        }

        .mode-badge.show {
            display: block;
        }

        .timer-display {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 18px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .timer-display.show {
            display: block;
        }

        @media (max-width: 768px) {
            .game-header {
                padding: 5px 10px;
                min-height: 40px;
            }

            .room-badge {
                font-size: 10px;
                padding: 3px 10px;
            }

            .player-badge {
                font-size: 11px;
            }

            .btn-leave-game {
                padding: 4px 12px;
                font-size: 10px;
            }

            .score-display {
                padding: 5px 15px;
                gap: 15px;
                top: 10px;
            }

            .score-team {
                font-size: 16px;
            }

            .score-divider {
                font-size: 16px;
            }

            .mobile-controls.active {
                display: flex;
            }

            .joystick-area {
                width: 100px;
                height: 100px;
            }

            .joystick-knob {
                width: 40px;
                height: 40px;
            }

            .kick-button {
                width: 65px;
                height: 65px;
                font-size: 13px;
            }

            .game-status-bar {
                padding: 5px 15px;
                bottom: 100px;
            }

            .status-text {
                font-size: 11px;
            }

            .mode-badge {
                top: 60px;
                left: 10px;
                font-size: 10px;
                padding: 4px 10px;
            }

            .timer-display {
                top: 60px;
                font-size: 14px;
                padding: 4px 14px;
            }
        }

        @media (pointer: coarse) {
            .mobile-controls.active {
                display: flex;
            }
        }

        @media (pointer: fine) {
            .mobile-controls.active {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="game-header-left">
                <span class="room-badge" id="roomBadge">🏟️ Carregando...</span>
                <span class="player-badge">👤 <span id="playerNameDisplay">Jogador</span></span>
            </div>
            <div class="game-header-right">
                <button class="btn-leave-game" onclick="leaveGame()">🚪 Sair</button>
            </div>
        </div>

        <div class="game-container" id="gameContainer">
            <canvas id="gameCanvas"></canvas>

            <div class="score-display">
                <span class="score-team red" id="redScore">0</span>
                <span class="score-divider">vs</span>
                <span class="score-team blue" id="blueScore">0</span>
            </div>

            <div class="mode-badge" id="modeBadge">🎯 Modo: Treino</div>
            <div class="timer-display" id="timerDisplay">⏱️ 3:00</div>

            <div class="game-status-bar">
                <span class="status-text" id="gameStatusText">⏳ Aguardando...</span>
            </div>

            <div class="mobile-controls" id="mobileControls">
                <div class="joystick-area" id="joystickArea">
                    <div class="joystick-knob" id="joystickKnob"></div>
                </div>
                <div class="kick-button" id="kickButton">⚽ CHUTAR</div>
            </div>

            <div class="waiting-overlay" id="waitingOverlay">
                <div class="waiting-spinner"></div>
                <div class="waiting-text" id="waitingText">⏳ Aguardando jogadores...</div>
                <div class="waiting-sub" id="waitingSub">Aguardando oponente</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');

        let canvasWidth, canvasHeight;
        let gameMode = 'online';
        let gameState = 'waiting';
        let matchTime = 180;
        let timerInterval = null;
        let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const playerName = localStorage.getItem('goalverse_current_user') || 'Jogador';
        document.getElementById('playerNameDisplay').textContent = playerName;

        const savedMode = localStorage.getItem('goalverse_mode') || 'online';
        gameMode = savedMode;

        if (isMobile) {
            document.getElementById('mobileControls').classList.add('active');
        }

        let localPlayer = {
            x: 0,
            y: 0,
            radius: 18,
            speed: 4.5,
            direction: 0,
            team: 'red',
            kickCooldown: 0
        };

        let ball = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 12
        };

        let aiPlayers = [];
        let scores = { red: 0, blue: 0 };
        let keys = { w: false, a: false, s: false, d: false };
        let joystick = { x: 0, y: 0, active: false };
        let isKicking = false;

        const modeNames = {
            online: '🌍 Multiplayer',
            '1v1': '⚔️ Duelo 1v1',
            solo: '🎯 Treino Solo'
        };

        document.getElementById('modeBadge').textContent = 'Modo: ' + (modeNames[gameMode] || 'Online');
        document.getElementById('modeBadge').classList.add('show');

        function initGame() {
            if (gameMode === 'online') {
                startOnlineMode();
            } else if (gameMode === '1v1') {
                startDuelMode();
            } else if (gameMode === 'solo') {
                startSoloMode();
            }
        }

        function startOnlineMode() {
            const roomId = localStorage.getItem('goalverse_room') || 'sala1';
            document.getElementById('roomBadge').textContent = '🏟️ ' + (roomId === 'sala1' ? 'Sala 1 - 5v5' : roomId === 'sala2' ? 'Sala 2 - 3v3' : 'Sala 3 - 2v2');
            
            document.getElementById('waitingText').textContent = '⏳ Aguardando jogadores...';
            document.getElementById('waitingSub').textContent = 'Aguardando mais jogadores para começar';
            document.getElementById('waitingOverlay').classList.add('show');

            setTimeout(() => {
                document.getElementById('waitingOverlay').classList.remove('show');
                gameState = 'playing';
                document.getElementById('gameStatusText').textContent = '🎮 Jogo em andamento!';
                startTimer();
            }, 2000);

            resetGame();
        }

        function startDuelMode() {
            document.getElementById('roomBadge').textContent = '⚔️ Duelo 1v1';
            document.getElementById('waitingText').textContent = '⚔️ Duelo 1v1';
            document.getElementById('waitingSub').textContent = 'Você contra a IA!';
            document.getElementById('waitingOverlay').classList.add('show');

            setTimeout(() => {
                document.getElementById('waitingOverlay').classList.remove('show');
                gameState = 'playing';
                document.getElementById('gameStatusText').textContent = '⚔️ Duelo contra a IA!';
                
                localPlayer.team = 'red';
                localPlayer.x = canvasWidth * 0.2;
                localPlayer.y = canvasHeight / 2;

                aiPlayers = [{
                    name: 'IA Oponente',
                    x: canvasWidth * 0.8,
                    y: canvasHeight / 2,
                    radius: 18,
                    team: 'blue',
                    speed: 3.2,
                    direction: 0
                }];

                startTimer();
            }, 1500);

            resetGame();
        }

        function startSoloMode() {
            document.getElementById('roomBadge').textContent = '🎯 Treino Solo';
            document.getElementById('waitingText').textContent = '🎯 Treino Solo';
            document.getElementById('waitingSub').textContent = 'Pratique contra o goleiro!';
            document.getElementById('waitingOverlay').classList.add('show');

            setTimeout(() => {
                document.getElementById('waitingOverlay').classList.remove('show');
                gameState = 'playing';
                document.getElementById('gameStatusText').textContent = '🎯 Treine seus chutes!';
                
                localPlayer.team = 'red';
                localPlayer.x = canvasWidth * 0.2;
                localPlayer.y = canvasHeight / 2;

                aiPlayers = [{
                    name: 'Goleiro IA',
                    x: canvasWidth * 0.88,
                    y: canvasHeight / 2,
                    radius: 25,
                    team: 'blue',
                    speed: 3.5,
                    direction: 0,
                    isGoalkeeper: true
                }];

                startTimer();
            }, 1500);

            resetGame();
        }

        function resetGame() {
            ball.x = canvasWidth / 2;
            ball.y = canvasHeight / 2;
            ball.vx = 0;
            ball.vy = 0;
            scores = { red: 0, blue: 0 };
            document.getElementById('redScore').textContent = '0';
            document.getElementById('blueScore').textContent = '0';
        }

        function startTimer() {
            matchTime = 180;
            document.getElementById('timerDisplay').classList.add('show');
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                matchTime--;
                const minutes = Math.floor(matchTime / 60);
                const seconds = matchTime % 60;
                document.getElementById('timerDisplay').textContent = '⏱️ ' + minutes + ':' + seconds.toString().padStart(2, '0');
                
                if (matchTime <= 0) {
                    clearInterval(timerInterval);
                    gameState = 'finished';
                    document.getElementById('gameStatusText').textContent = '⏰ Tempo esgotado!';
                }
            }, 1000);
        }

        function updateAI() {
            if (gameMode === 'solo') {
                const gk = aiPlayers[0];
                if (!gk) return;

                const targetY = ball.y;
                const dx = targetY - gk.y;
                const speed = gk.speed * 0.7;
                
                if (Math.abs(dx) > 10) {
                    gk.y += Math.sign(dx) * Math.min(Math.abs(dx) * 0.08, speed);
                }

                gk.y = Math.max(gk.radius, Math.min(canvasHeight - gk.radius, gk.y));

                const distToBall = Math.sqrt(Math.pow(ball.x - gk.x, 2) + Math.pow(ball.y - gk.y, 2));
                if (distToBall < gk.radius + ball.radius + 10 && ball.x > canvasWidth * 0.6) {
                    const angle = Math.atan2(ball.y - gk.y, ball.x - gk.x);
                    const pushForce = 6;
                    ball.vx += Math.cos(angle) * pushForce;
                    ball.vy += Math.sin(angle) * pushForce;
                }

                if (ball.x > canvasWidth * 0.9 && Math.abs(ball.y - gk.y) < 50) {
                    if (ball.vx > 0) {
                        ball.vx *= -0.8;
                        ball.vy *= 0.5;
                    }
                }

            } else if (gameMode === '1v1') {
                const ai = aiPlayers[0];
                if (!ai) return;

                const dx = ball.x - ai.x;
                const dy = ball.y - ai.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 50) {
                    const speed = ai.speed * 0.9;
                    ai.x += (dx / dist) * Math.min(dist * 0.04, speed);
                    ai.y += (dy / dist) * Math.min(dist * 0.04, speed);
                } else {
                    const angle = Math.atan2(dy, dx);
                    ai.x += Math.cos(angle) * ai.speed * 0.3;
                    ai.y += Math.sin(angle) * ai.speed * 0.3;
                }

                ai.x = Math.max(ai.radius, Math.min(canvasWidth - ai.radius, ai.x));
                ai.y = Math.max(ai.radius, Math.min(canvasHeight - ai.radius, ai.y));

                if (dist < ai.radius + ball.radius + 5) {
                    const angle = Math.atan2(ball.y - ai.y, ball.x - ai.x);
                    const pushForce = 7;
                    ball.vx += Math.cos(angle) * pushForce;
                    ball.vy += Math.sin(angle) * pushForce;
                }
            }
        }

        function updatePlayerMovement() {
            if (gameState !== 'playing') return;

            let dx = 0, dy = 0;

            if (isMobile && joystick.active) {
                const magnitude = Math.sqrt(joystick.x * joystick.x + joystick.y * joystick.y);
                if (magnitude > 0.1) {
                    const normalizedX = joystick.x / magnitude;
                    const normalizedY = joystick.y / magnitude;
                    const speed = Math.min(magnitude, 1) * localPlayer.speed;
                    dx = normalizedX * speed;
                    dy = normalizedY * speed;
                    
                    if (magnitude > 0.2) {
                        localPlayer.direction = Math.atan2(normalizedY, normalizedX);
                    }
                }
            } else {
                if (keys.w) dy = -localPlayer.speed;
                if (keys.s) dy = localPlayer.speed;
                if (keys.a) dx = -localPlayer.speed;
                if (keys.d) dx = localPlayer.speed;

                if (dx !== 0 || dy !== 0) {
                    const length = Math.sqrt(dx * dx + dy * dy);
                    dx = (dx / length) * localPlayer.speed;
                    dy = (dy / length) * localPlayer.speed;
                    localPlayer.direction = Math.atan2(dy, dx);
                }
            }

            if (dx !== 0 || dy !== 0) {
                const newX = localPlayer.x + dx;
                const newY = localPlayer.y + dy;
                const margin = localPlayer.radius;
                localPlayer.x = Math.max(margin, Math.min(canvasWidth - margin, newX));
                localPlayer.y = Math.max(margin, Math.min(canvasHeight - margin, newY));
            }

            if (localPlayer.kickCooldown > 0) {
                localPlayer.kickCooldown--;
            }

            if (isKicking && localPlayer.kickCooldown === 0) {
                kickBall();
                isKicking = false;
                localPlayer.kickCooldown = 20;
            }

            updateBall();
            updateAI();
        }

        function kickBall() {
            const kickPower = 12;
            const direction = localPlayer.direction;
            
            const dx = Math.cos(direction) * kickPower;
            const dy = Math.sin(direction) * kickPower;
            
            const distToBall = Math.sqrt(
                Math.pow(ball.x - localPlayer.x, 2) + 
                Math.pow(ball.y - localPlayer.y, 2)
            );
            
            if (distToBall < localPlayer.radius + ball.radius + 5) {
                ball.vx += dx * 0.5;
                ball.vy += dy * 0.5;
                
                const angle = Math.atan2(ball.y - localPlayer.y, ball.x - localPlayer.x);
                const pushForce = 5;
                ball.vx += Math.cos(angle) * pushForce;
                ball.vy += Math.sin(angle) * pushForce;
            }
        }

        function updateBall() {
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            ball.vx *= 0.98;
            ball.vy *= 0.98;
            
            if (Math.abs(ball.vx) < 0.01) ball.vx = 0;
            if (Math.abs(ball.vy) < 0.01) ball.vy = 0;

            const margin = ball.radius;
            if (ball.x - margin < 0) {
                ball.x = margin;
                ball.vx = -ball.vx * 0.8;
            }
            if (ball.x + margin > canvasWidth) {
                ball.x = canvasWidth - margin;
                ball.vx = -ball.vx * 0.8;
            }
            if (ball.y - margin < 0) {
                ball.y = margin;
                ball.vy = -ball.vy * 0.8;
            }
            if (ball.y + margin > canvasHeight) {
                ball.y = canvasHeight - margin;
                ball.vy = -ball.vy * 0.8;
            }

            checkGoal();
        }

        function checkGoal() {
            const goalWidth = 60;
            const goalHeight = 120;
            
            if (ball.x < 20 && ball.y > canvasHeight/2 - goalHeight/2 && ball.y < canvasHeight/2 + goalHeight/2) {
                scores.blue++;
                document.getElementById('blueScore').textContent = scores.blue;
                resetBall();
                if (gameMode === 'solo' || gameMode === '1v1') {
                    document.getElementById('gameStatusText').textContent = '💀 Gol do oponente!';
                    setTimeout(() => {
                        document.getElementById('gameStatusText').textContent = gameMode === 'solo' ? '🎯 Continue treinando!' : '⚔️ Duelo continua!';
                    }, 1500);
                }
            }
            
            if (ball.x > canvasWidth - 20 && ball.y > canvasHeight/2 - goalHeight/2 && ball.y < canvasHeight/2 + goalHeight/2) {
                scores.red++;
                document.getElementById('redScore').textContent = scores.red;
                resetBall();
                if (gameMode === 'solo' || gameMode === '1v1') {
                    document.getElementById('gameStatusText').textContent = '⚽ GOOOOOOOL!';
                    setTimeout(() => {
                        document.getElementById('gameStatusText').textContent = gameMode === 'solo' ? '🎯 Continue treinando!' : '⚔️ Duelo continua!';
                    }, 1500);
                }
            }
        }

        function resetBall() {
            ball.x = canvasWidth / 2;
            ball.y = canvasHeight / 2;
            ball.vx = 0;
            ball.vy = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            drawField();
            drawPlayers();
            drawBall();
            drawDirection();
        }

        function drawField() {
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.moveTo(canvasWidth/2, 0);
            ctx.lineTo(canvasWidth/2, canvasHeight);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(canvasWidth/2, canvasHeight/2, 60, 0, Math.PI * 2);
            ctx.stroke();

            const goalWidth = 60;
            const goalHeight = 120;

            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 3;

            ctx.strokeRect(10, canvasHeight/2 - goalHeight/2, goalWidth, goalHeight);
            ctx.strokeRect(canvasWidth - 10 - goalWidth, canvasHeight/2 - goalHeight/2, goalWidth, goalHeight);

            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.fillRect(0, canvasHeight/2 - goalHeight/2, 20, goalHeight);
            ctx.fillRect(canvasWidth - 20, canvasHeight/2 - goalHeight/2, 20, goalHeight);
        }

        function drawPlayers() {
            if (gameMode === 'solo' || gameMode === '1v1') {
                const isRed = localPlayer.team === 'red';
                const color = isRed ? '#f44336' : '#2196F3';
                const glowColor = isRed ? 'rgba(244, 67, 54, 0.3)' : 'rgba(33, 150, 243, 0.3)';

                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 20;

                ctx.beginPath();
                ctx.arc(localPlayer.x, localPlayer.y, localPlayer.radius, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = 'white';
                ctx.font = isMobile ? '10px Arial' : '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('Você', localPlayer.x, localPlayer.y - localPlayer.radius - 5);

                aiPlayers.forEach(ai => {
                    const aiColor = ai.team === 'red' ? '#f44336' : '#2196F3';
                    ctx.shadowColor = 'rgba(255,255,255,0.1)';
                    ctx.shadowBlur = 10;

                    ctx.beginPath();
                    ctx.arc(ai.x, ai.y, ai.radius, 0, Math.PI * 2);
                    ctx.fillStyle = aiColor;
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = isMobile ? '9px Arial' : '11px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText(ai.isGoalkeeper ? '🧤 GK' : ai.name, ai.x, ai.y - ai.radius - 5);

                    if (ai.isGoalkeeper) {
                        ctx.strokeStyle = 'rgba(255,215,0,0.3)';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        ctx.arc(ai.x, ai.y, ai.radius + 8, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                });
            }
        }

        function drawBall() {
            const gradient = ctx.createRadialGradient(
                ball.x - 4, ball.y - 4, 2,
                ball.x, ball.y, ball.radius
            );
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.7, '#e0e0e0');
            gradient.addColorStop(1, '#999999');

            ctx.shadowColor = 'rgba(255,255,255,0.2)';
            ctx.shadowBlur = 15;

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawDirection() {
            if (gameState !== 'playing') return;

            const dirX = Math.cos(localPlayer.direction);
            const dirY = Math.sin(localPlayer.direction);
            const lineLength = 30;

            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);

            ctx.beginPath();
            ctx.moveTo(localPlayer.x, localPlayer.y);
            ctx.lineTo(localPlayer.x + dirX * lineLength, localPlayer.y + dirY * lineLength);
            ctx.stroke();

            ctx.setLineDash([]);
        }

        function gameLoop() {
            updatePlayerMovement();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 'a', 's', 'd', ' '].includes(key)) {
                e.preventDefault();
            }
            if (key === ' ') {
                if (gameState === 'playing' && localPlayer.kickCooldown === 0) {
                    isKicking = true;
                }
                return;
            }
            if (key in keys) {
                keys[key] = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === ' ') {
                isKicking = false;
                return;
            }
            if (key in keys) {
                keys[key] = false;
            }
        });

        const joystickArea = document.getElementById('joystickArea');
        const joystickKnob = document.getElementById('joystickKnob');

        if (isMobile) {
            let touchId = null;

            joystickArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchId = touch.identifier;
                joystick.active = true;
                updateJoystick(touch);
            });

            joystickArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = Array.from(e.touches).find(t => t.identifier === touchId);
                if (touch) {
                    updateJoystick(touch);
                }
            });

            joystickArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystick.active = false;
                joystick.x = 0;
                joystick.y = 0;
                joystickKnob.style.transform = 'translate(-50%, -50%)';
                touchId = null;
            });

            function updateJoystick(touch) {
                const rect = joystickArea.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const maxDist = rect.width / 2 - 25;

                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > maxDist) {
                    dx = (dx / distance) * maxDist;
                    dy = (dy / distance) * maxDist;
                }

                joystick.x = dx / maxDist;
                joystick.y = dy / maxDist;

                joystickKnob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
            }

            document.getElementById('kickButton').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameState === 'playing' && localPlayer.kickCooldown === 0) {
                    isKicking = true;
                }
            });

            document.getElementById('kickButton').addEventListener('touchend', (e) => {
                e.preventDefault();
                isKicking = false;
            });
        }

        function leaveGame() {
            if (confirm('Tem certeza que quer sair da partida?')) {
                localStorage.removeItem('goalverse_room');
                localStorage.removeItem('goalverse_mode');
                window.location.href = 'menu.html';
            }
        }

        document.querySelector('.btn-leave-game').addEventListener('click', leaveGame);

        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        initGame();
        gameLoop();

        console.log('🎮 GoalVerse - Jogo iniciado!');
        console.log('👤 Jogador:', playerName);
        console.log('📱 Mobile:', isMobile ? 'Sim' : 'Não');
        console.log('🎯 Modo:', gameMode);
    </script>
</body>
</html>
